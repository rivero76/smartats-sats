# 2026-03-27 10:30:00 | Fix dev port mapping: vite.config.ts sets port 8080, corrected 8080:5173 → 8080:8080

version: '3.9'

services:
  smartats-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_LOGGING_ENABLED=${VITE_LOGGING_ENABLED:-true}
    env_file: .env
    container_name: smartats-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Development service with hot reload
  smartats-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: smartats-dev
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    profiles:
      - dev
