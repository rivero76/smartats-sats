# fly.toml — Fly.io deploy configuration for the SmartATS LinkedIn scraper service.
#
# UPDATE LOG
# 2026-03-31 | Replaced railway.json with fly.toml (Option A: Railway → Fly.io migration).
#               MVP-TEMPORARY — see INFRA-1 in docs/improvements/TECHNICAL_IMPROVEMENTS.md.
#               Review hosting strategy before scaling beyond MVP audience.

app = "smartats-linkedin-scraper"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# Playwright/Chromium requires at least 512 MB; 1 GB avoids OOM on complex profiles.
# auto_stop_machines: scales to 0 when idle to minimise cost on MVP free tier.
# Session cookies survive restarts via the LINKEDIN_COOKIES env var (base64 JSON).
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 5
    soft_limit = 2

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
